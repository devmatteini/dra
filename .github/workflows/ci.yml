name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "assets/**"
      - "install.sh"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

# NOTE: always set shell: bash, otherwise on Windows there might be problems!
jobs:
  format-check:
    if: github.repository_owner == 'devmatteini'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "stable"
          components: "rustfmt"
      - name: Format check
        run: make format-check

  build-and-test:
    name: ${{ matrix.job.os }}
    needs: [ format-check ]
    runs-on: ${{ matrix.job.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        job:
          - os: linux
            runner: ubuntu-24.04
          - os: macos-arm64
            runner: macos-15
          - os: windows
            runner: windows-2025-vs2026
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "stable"
          components: "clippy"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # 2.9.1

      - name: Build
        shell: bash
        run: make build

      - name: Lint
        shell: bash
        run: make lint

      - name: Tests
        shell: bash
        run: make test

      - name: Integration tests
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make integration-tests

      - name: Debian integration tests
        if: matrix.job.os == 'linux'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make debian-tests

      - name: Fedora integration tests
        if: matrix.job.os == 'linux'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make fedora-tests

  check-other-targets:
    name: ${{ matrix.job.os }}
    needs: [ format-check ]
    runs-on: ${{ matrix.job.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        job:
          - os: linux-musl
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            use-cross: true
          - os: linux-armv6
            runner: ubuntu-24.04
            target: arm-unknown-linux-gnueabihf
            use-cross: true
          - os: linux-arm64
            runner: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            use-cross: true
          - os: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            use-cross: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "stable"
          targets: "${{ matrix.job.target }}"
          components: "clippy"

      - uses: taiki-e/install-action@873c7452cadb7c034694a1282227095d93fbdf92 # 2.79.14
        if: matrix.job.use-cross == true
        with:
          tool: cross

      - name: Setup build tools
        if: matrix.job.use-cross == true
        shell: bash
        run: echo "CARGO_BIN=cross" >>$GITHUB_ENV

      - name: Export cargo target
        shell: bash
        run: echo "CARGO_TARGET=${{ matrix.job.target }}" >>$GITHUB_ENV

      - name: Build
        shell: bash
        run: make build
